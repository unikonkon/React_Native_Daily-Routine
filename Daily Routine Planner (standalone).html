  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

n                  <div style=\"background:#F6F3EE;border-radius:13px;padding:13px 15px;\">\n                    <div style=\"display:flex;align-items:center;gap:7px;\"><span style=\"{{ l.badgeStyle }}\">{{ l.prioLevel }}<\u002Fspan><span style=\"font-size:14px;font-weight:600;\">{{ l.contact }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"display:flex;align-items:center;gap:8px;margin-top:7px;font-size:12.5px;color:#8B8578;\">\n                      <span style=\"text-decoration:line-through;\">{{ l.fromLabel }}<\u002Fspan>\n                      <span style=\"color:#D96F4C;font-weight:700;\">→<\u002Fspan>\n                      <span style=\"color:#2A2620;font-weight:600;\">{{ l.toLabel }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"font-size:12px;color:#8B8578;margin-top:4px;\">เหตุผล: {{ l.reason }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ================= SETTINGS ================= -->\n        <sc-if value=\"{{ isSettings }}\">\n          <div style=\"padding:8px 18px 24px;\">\n            <!-- MAIN -->\n            <sc-if value=\"{{ settingsMain }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"font-size:22px;font-weight:700;\">ตั้งค่า<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:1px;background:#E7E1D6;border-radius:16px;overflow:hidden;margin-top:16px;\">\n                <div onclick=\"{{ goStatsX }}\" style=\"display:none;\"><\u002Fdiv>\n                <div onclick=\"{{ goSetView }}\" style=\"display:none;\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #E7E1D6;border-radius:16px;overflow:hidden;margin-top:16px;\">\n                <div onclick=\"{{ goStats }}\" style=\"display:flex;align-items:center;gap:12px;padding:15px;border-bottom:1px solid #F0ECE4;cursor:pointer;\">\n                  <div style=\"width:32px;height:32px;border-radius:9px;background:#E4F1EA;display:flex;align-items:center;justify-content:center;font-size:17px;\">📊<\u002Fdiv>\n                  <span style=\"flex:1;font-size:15.5px;font-weight:500;\">สถิติ &amp; ความสำเร็จ<\u002Fspan>\n                  <svg width=\"8\" height=\"14\" viewBox=\"0 0 8 14\"><path d=\"M1 1l6 6-6 6\" stroke=\"#C9C1B2\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                <\u002Fdiv>\n                <div onclick=\"{{ goCats }}\" style=\"display:flex;align-items:center;gap:12px;padding:15px;border-bottom:1px solid #F0ECE4;cursor:pointer;\">\n                  <div style=\"width:32px;height:32px;border-radius:9px;background:#EFE8F5;display:flex;align-items:center;justify-content:center;font-size:17px;\">🗂️<\u002Fdiv>\n                  <span style=\"flex:1;font-size:15.5px;font-weight:500;\">จัดการหมวดหมู่<\u002Fspan>\n                  <svg width=\"8\" height=\"14\" viewBox=\"0 0 8 14\"><path d=\"M1 1l6 6-6 6\" stroke=\"#C9C1B2\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                <\u002Fdiv>\n                <div onclick=\"{{ goNotif }}\" style=\"display:flex;align-items:center;gap:12px;padding:15px;cursor:pointer;\">\n                  <div style=\"width:32px;height:32px;border-radius:9px;background:#FBEDE6;display:flex;align-items:center;justify-content:center;font-size:17px;\">🔔<\u002Fdiv>\n                  <span style=\"flex:1;font-size:15.5px;font-weight:500;\">การแจ้งเตือน<\u002Fspan>\n                  <svg width=\"8\" height=\"14\" viewBox=\"0 0 8 14\"><path d=\"M1 1l6 6-6 6\" stroke=\"#C9C1B2\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"font-size:12.5px;color:#8B8578;font-weight:600;margin:22px 4px 8px;\">ธีม<\u002Fdiv>\n              <div style=\"display:flex;gap:3px;background:#EAE4D9;padding:3px;border-radius:11px;\">\n                <sc-for list=\"{{ themeSeg }}\" as=\"o\" hint-placeholder-count=\"3\"><div style=\"{{ o.style }}\" onclick=\"{{ o.onClick }}\">{{ o.label }}<\u002Fdiv><\u002Fsc-for>\n              <\u002Fdiv>\n\n              <div style=\"font-size:12.5px;color:#8B8578;font-weight:600;margin:22px 4px 8px;\">ข้อมูล<\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #E7E1D6;border-radius:16px;overflow:hidden;\">\n                <div style=\"display:flex;align-items:center;gap:12px;padding:15px;border-bottom:1px solid #F0ECE4;cursor:pointer;\"><span style=\"flex:1;font-size:15px;\">ส่งออก CSV (เดือนนี้)<\u002Fspan><span style=\"font-size:13px;color:#8B8578;\">Excel<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:12px;padding:15px;border-bottom:1px solid #F0ECE4;cursor:pointer;\"><span style=\"flex:1;font-size:15px;\">สำรอง / นำเข้า (JSON)<\u002Fspan><svg width=\"8\" height=\"14\" viewBox=\"0 0 8 14\"><path d=\"M1 1l6 6-6 6\" stroke=\"#C9C1B2\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:12px;padding:15px;cursor:pointer;\">\n                  <div style=\"width:22px;height:22px;border-radius:6px;background:#1E8E3E;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;\">S<\u002Fdiv>\n                  <div style=\"flex:1;\"><div style=\"font-size:15px;\">Google Sheets<\u002Fdiv><div style=\"font-size:12px;color:#8B8578;\">{{ googleEmail }}<\u002Fdiv><\u002Fdiv>\n                  <span style=\"font-size:12px;font-weight:700;color:#4C9A73;background:#E4F1EA;padding:3px 9px;border-radius:7px;\">เชื่อมแล้ว<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- STATS -->\n            <sc-if value=\"{{ settingsStats }}\">\n              <div style=\"display:flex;align-items:center;gap:10px;\"><div onclick=\"{{ backSet }}\" style=\"font-size:20px;cursor:pointer;color:#6E6A5F;\">‹<\u002Fdiv><div style=\"font-size:20px;font-weight:700;\">สถิติ · สัปดาห์นี้<\u002Fdiv><\u002Fdiv>\n              <div style=\"display:flex;gap:10px;margin-top:16px;\">\n                <div style=\"flex:1;background:#fff;border:1px solid #E7E1D6;border-radius:15px;padding:15px;text-align:center;\"><div style=\"font-size:30px;font-weight:700;color:#4C9A73;\">{{ successRate }}%<\u002Fdiv><div style=\"font-size:12px;color:#8B8578;margin-top:2px;\">อัตราสำเร็จ<\u002Fdiv><\u002Fdiv>\n                <div style=\"flex:1;background:#fff;border:1px solid #E7E1D6;border-radius:15px;padding:15px;text-align:center;\"><div style=\"font-size:30px;font-weight:700;color:#D96F4C;\">{{ streak }}🔥<\u002Fdiv><div style=\"font-size:12px;color:#8B8578;margin-top:2px;\">วันติดต่อกัน<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:10px;margin-top:10px;\">\n                <div style=\"flex:1;background:#fff;border:1px solid #E7E1D6;border-radius:15px;padding:13px 15px;\"><div style=\"font-size:22px;font-weight:700;color:#4C9A73;\">{{ statDone }}<\u002Fdiv><div style=\"font-size:12px;color:#8B8578;\">ทำสำเร็จ<\u002Fdiv><\u002Fdiv>\n                <div style=\"flex:1;background:#fff;border:1px solid #E7E1D6;border-radius:15px;padding:13px 15px;\"><div style=\"font-size:22px;font-weight:700;color:#B4AE9F;\">{{ statSkip }}<\u002Fdiv><div style=\"font-size:12px;color:#8B8578;\">ข้าม<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"font-size:13px;font-weight:600;color:#6E6A5F;margin-top:20px;\">กิจกรรมต่อวัน<\u002Fdiv>\n              <div style=\"display:flex;align-items:flex-end;gap:8px;height:80px;margin-top:12px;background:#fff;border:1px solid #E7E1D6;border-radius:15px;padding:14px 12px 10px;\">\n                <sc-for list=\"{{ trend }}\" as=\"t\" hint-placeholder-count=\"7\">\n                  <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:flex-end;height:100%;\">\n                    <div style=\"width:100%;display:flex;align-items:flex-end;flex:1;\"><div style=\"{{ t.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n                    <span style=\"font-size:10px;color:#8B8578;\">{{ t.wd }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n\n              <div style=\"font-size:13px;font-weight:600;color:#6E6A5F;margin-top:20px;\">ชั่วโมงตามหมวด<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:13px;margin-top:12px;background:#fff;border:1px solid #E7E1D6;border-radius:15px;padding:16px;\">\n                <sc-for list=\"{{ statsHours }}\" as=\"h\" hint-placeholder-count=\"4\">\n                  <div>\n                    <div style=\"display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;\"><span style=\"font-weight:500;\">{{ h.icon }} {{ h.name }}<\u002Fspan><span style=\"font-weight:600;color:#6E6A5F;\">{{ h.hours }} ชม.<\u002Fspan><\u002Fdiv>\n                    <div style=\"height:8px;background:#F0ECE4;border-radius:8px;overflow:hidden;\"><div style=\"{{ h.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- CATEGORIES -->\n            <sc-if value=\"{{ settingsCats }}\">\n              <div style=\"display:flex;align-items:center;gap:10px;\"><div onclick=\"{{ backSet }}\" style=\"font-size:20px;cursor:pointer;color:#6E6A5F;\">‹<\u002Fdiv><div style=\"font-size:20px;font-weight:700;\">จัดการหมวดหมู่<\u002Fdiv><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:16px;\">\n                <sc-for list=\"{{ catManage }}\" as=\"c\" hint-placeholder-count=\"6\">\n                  <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E7E1D6;border-radius:13px;padding:12px 14px;\">\n                    <div style=\"{{ c.barStyle }}\"><\u002Fdiv>\n                    <div style=\"{{ c.dotStyle }}\">{{ c.icon }}<\u002Fdiv>\n                    <span style=\"flex:1;font-size:15px;font-weight:500;\">{{ c.name }}<\u002Fspan>\n                    <sc-if value=\"{{ c.isCase }}\"><span style=\"font-size:11px;font-weight:700;color:#D96F4C;background:#FBEDE6;padding:2px 8px;border-radius:6px;\">เคส<\u002Fspan><\u002Fsc-if>\n                    <svg width=\"8\" height=\"14\" viewBox=\"0 0 8 14\"><path d=\"M1 1l6 6-6 6\" stroke=\"#C9C1B2\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <div style=\"text-align:center;padding:14px;border-radius:13px;border:1.5px dashed #D6CFC2;color:#8B8578;font-size:14px;font-weight:600;cursor:pointer;margin-top:2px;\">+ เพิ่มหมวดหมู่<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- NOTIFICATIONS -->\n            <sc-if value=\"{{ settingsNotif }}\">\n              <div style=\"display:flex;align-items:center;gap:10px;\"><div onclick=\"{{ backSet }}\" style=\"font-size:20px;cursor:pointer;color:#6E6A5F;\">‹<\u002Fdiv><div style=\"font-size:20px;font-weight:700;\">การแจ้งเตือน<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #E7E1D6;border-radius:16px;overflow:hidden;margin-top:16px;\">\n                <div style=\"display:flex;align-items:center;padding:15px;border-bottom:1px solid #F0ECE4;\"><span style=\"flex:1;font-size:15px;font-weight:500;\">เปิดการแจ้งเตือน<\u002Fspan><div style=\"{{ masterSwitch }}\" onclick=\"{{ toggleMaster }}\"><div style=\"{{ masterKnob }}\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n
