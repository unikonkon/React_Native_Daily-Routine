document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

cursor:pointer;font-family:inherit\">\n                  <div style=\"width:52px;flex:none;padding-top:11px\">\n                    <div style=\"font:600 12.5px/1 'IBM Plex Sans',sans-serif;color:var(--text)\">{{ a.start }}<\u002Fdiv>\n                    <div style=\"font:400 10.5px/1 'IBM Plex Sans',sans-serif;color:var(--faint);margin-top:3px\">{{ a.end }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"flex:1;position:relative;border-radius:15px;background:var(--surface);border:1px solid var(--border);padding:11px 13px;box-shadow:0 1px 2px rgba(0,0,0,.04);overflow:hidden;opacity:{{ a.op }}\">\n                    <span style=\"position:absolute;left:0;top:0;bottom:0;width:4px;background:{{ a.color }}\"><\u002Fspan>\n                    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\">\n                      <div style=\"display:flex;align-items:center;gap:8px;min-width:0\">\n                        <span style=\"width:9px;height:9px;border-radius:3px;background:{{ a.color }};flex:none\"><\u002Fspan>\n                        <span style=\"font:600 14px/1.25 'IBM Plex Sans Thai',sans-serif;color:var(--text);text-decoration:{{ a.strike }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ a.title }}<\u002Fspan>\n                      <\u002Fdiv>\n                      <sc-if value=\"{{ a.showCheck }}\" hint-placeholder-val=\"{{ true }}\">\n                        <span onclick=\"{{ a.onCheck }}\" style=\"width:23px;height:23px;flex:none;border-radius:50%;border:2px solid {{ a.checkBorder }};background:{{ a.checkBg }};display:flex;align-items:center;justify-content:center\">\n                          <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ a.checkTick }}\" stroke-width=\"3.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n                        <\u002Fspan>\n                      <\u002Fsc-if>\n                    <\u002Fdiv>\n                    <div style=\"display:flex;align-items:center;gap:7px;margin-top:6px;flex-wrap:wrap\">\n                      <span style=\"font:500 11px/1 'IBM Plex Sans Thai',sans-serif;color:{{ a.color }};background:{{ a.softBg }};padding:3px 8px;border-radius:7px\">{{ a.catName }}<\u002Fspan>\n                      <sc-if value=\"{{ a.isAppt }}\" hint-placeholder-val=\"{{ false }}\">\n                        <span style=\"display:flex;align-items:center;gap:4px;font:500 11px/1 'IBM Plex Sans Thai',sans-serif;color:var(--sub)\">\n                          <span style=\"width:6px;height:6px;border-radius:50%;background:{{ a.prioColor }}\"><\u002Fspan>{{ a.attendeeText }}\n                        <\u002Fspan>\n                      <\u002Fsc-if>\n                      <sc-if value=\"{{ a.rescheduled }}\" hint-placeholder-val=\"{{ false }}\">\n                        <span style=\"font:500 11px/1 'IBM Plex Sans Thai',sans-serif;color:var(--appt);background:rgba(249,115,22,.12);padding:3px 8px;border-radius:7px\">เลื่อนแล้ว → {{ a.reschedTo }}<\u002Fspan>\n                      <\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <div style=\"height:6px\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ CALENDAR ============ -->\n        <sc-if value=\"{{ isCalendar }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:2px 16px 0;animation:fadein .25s ease\">\n            <div style=\"display:flex;background:var(--surface2);border-radius:12px;padding:4px;margin-bottom:14px\">\n              <button onclick=\"{{ setCalWeek }}\" style=\"flex:1;padding:8px 0;border-radius:9px;border:none;background:{{ calWeekBtn.bg }};color:{{ calWeekBtn.col }};box-shadow:{{ calWeekBtn.sh }};font:600 13px/1 'IBM Plex Sans Thai',sans-serif;cursor:pointer\">สัปดาห์<\u002Fb  }};font:600 11.5px/1 'IBM Plex Sans Thai',sans-serif;cursor:pointer\">4 สัปดาห์ (Excel)<\u002Fbutton>\n              <\u002Fdiv>\n\n              <sc-if value=\"{{ wk1 }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:flex;gap:5px\">\n                  <sc-for list=\"{{ weekCols }}\" as=\"col\" hint-placeholder-count=\"7\">\n                    <div style=\"flex:1;min-width:0\">\n                      <div style=\"display:flex;flex-direction:column;align-items:center;gap:2px;background:{{ col.headBg }};border-radius:10px;padding:6px 0;margin-bottom:6px\">\n                        <span style=\"font:500 9.5px/1 'IBM Plex Sans Thai',sans-serif;color:{{ col.headCol }};opacity:.85\">{{ col.dow }}<\u002Fspan>\n                        <span style=\"font:600 13px/1 'IBM Plex Sans',sans-serif;color:{{ col.headCol }}\">{{ col.num }}<\u002Fspan>\n                      <\u002Fdiv>\n                      <div style=\"display:flex;flex-direction:column;gap:4px\">\n                        <sc-for list=\"{{ col.events }}\" as=\"e\" hint-placeholder-count=\"2\">\n                          <div style=\"background:{{ e.bg }};border-radius:7px;padding:5px 4px;border-left:2px solid {{ e.color }}\">\n                            <div style=\"font:600 8px/1 'IBM Plex Sans',sans-serif;color:{{ e.color }}\">{{ e.time }}<\u002Fdiv>\n                            <div style=\"font:500 8.5px/1.15 'IBM Plex Sans Thai',sans-serif;color:var(--text);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ e.title }}<\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fsc-for>\n                        <sc-if value=\"{{ col.empty }}\" hint-placeholder-val=\"{{ false }}\">\n                          <div style=\"border:1px dashed var(--border);border-radius:7px;padding:6px 0;text-align:center;font:500 8px/1 'IBM Plex Sans Thai',sans-serif;color:var(--faint)\">ว่าง<\u002Fdiv>\n                        <\u002Fsc-if>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ wk4 }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;flex-direction:column;gap:14px\">\n                  <sc-for list=\"{{ excelWeeks }}\" as=\"w\" hint-placeholder-count=\"4\">\n                    <div>\n                      <div style=\"font:600 10px/1 'IBM Plex Sans',sans-serif;color:var(--sub);margin-bottom:5px;letter-spacing:.6px\">{{ w.label }}<\u002Fdiv>\n                      <div style=\"border-radius:8px;overflow:hidden;border:1px solid var(--border)\">\n                        <div style=\"display:flex;background:var(--surface2)\">\n                          <div style=\"width:22px;flex:none\"><\u002Fdiv>\n                          <sc-for list=\"{{ w.rows.0.cells }}\" as=\"hc\" hint-placeholder-count=\"7\">\n                            <div style=\"flex:1;text-align:center;font:600 7px/1 'IBM Plex Sans Thai',sans-serif;color:var(--faint);padding:3px 0\">·<\u002Fdiv>\n                          <\u002Fsc-for>\n                        <\u002Fdiv>\n                        <sc-for list=\"{{ w.rows }}\" as=\"row\" hint-placeholder-count=\"10\">\n                          <div style=\"display:flex;align-items:stretch;height:11px;opacity:{{ row.rowOp }}\">\n                            <div style=\"width:22px;flex:none;font:500 6.5px/11px 'IBM Plex Sans',sans-serif;color:var(--faint);text-align:center\">{{ row.time }}<\u002Fdiv>\n                            <sc-for list=\"{{ row.cells }}\" as=\"cell\" hint-placeholder-count=\"7\">\n                              <div style=\"flex:1;background:{{ cell.color }};margin:0.5px\"><\u002Fdiv>\n                            <\u002Fsc-for>\n                          <\u002Fdiv>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                  <div style=\"font:400 10.5px/1.4 'IBM Plex Sans Thai',sans-serif;color:var(--faint);text-align:center\">ภาพรวมทั้งเดือนแบบ Excel · แตะช่องหรือ pinch-zoom เพื่อดูรายละเอียด<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ calMonth }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:8px\">\n                <span style=\"text-align:center;font:600 10px/1 'IBM Plex Sans Thai',sans-serif;color:var(--sub)\">จ<\u002Fspan>\n                <span style=\"text-align:center;font:600 10px/1 'IBM Plex Sans Thai',sans-serif;color:var(--sub)\">อ<\u002Fspan>\n                <span style=\"text-align:center;font:600 10px/1 'IBM Plex Sans Thai',sans-serif;color:var(--sub)\">พ<\u002Fspan>\n                <span style=\"text-align:center;font:600 10px/1 'IBM Plex Sans Thai',sans-serif;color:var(--sub)\">พฤ<\u002Fspan>\n                <span style=\"text-align:center;font:600 10px/1 'IBM Plex Sans Thai',sans-serif;color:var(--sub)\">ศ<\u002Fspan>\n                <span style=\"text-align:center;font:600 10px/1 'IBM Plex Sans Thai',sans-serif;color:var(--sub)\">ส<\u002Fspan>\n                <span style=\"text-align:center;font:600 10px/1 'IBM Plex Sans Thai',sans-serif;color:var(--sub)\">อา<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:3px\">\n                <sc-for list=\"{{ monthWeeks }}\" as=\"w\" hint-placeholder-count=\"5\">\n                  <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:3px\">\n                    <sc-for list=\"{{ w }}\" as=\"d\" hint-placeholder-count=\"7\">\n                      <button onclick=\"{{ d.onClick }}\" style=\"aspect-ratio:1/1.15;border-radius:11px;border:none;background:{{ d.bg }};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;font-family:inherit\">\n                        <span style=\"font:600 12.5px/1 'IBM Plex Sans',sans-serif;color:{{ d.numCol }}\">{{ d.n }}<\u002Fspan>\n                        <span style=\"display:flex;gap:2px;height:5px\">\n                          <sc-for list=\"{{ d.dots }}\" as=\"dot\" hint-placeholder-count=\"2\">\n                            <span style=\"width:4px;height:4px;border-radius:50%;background:{{ dot }}\"><\u002Fspan>\n                          <\u002Fsc-for>\n                        <\u002Fspan>\n                      <\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ CASES ============ -->\n        <sc-if value=\"{{ isCases }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:2px 16px 0;animation:fadein .25s ease\">\n            <div style=\"display:flex;align-items:center;gap:9px;background:var(--surface2);border-radius:13px;padding:11px 14px;margin-bottom:14px\">\n              <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--faint)\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4\"><\u002Fpath><\u002Fsvg>\n              <span style=\"font:400 13px/1 'IBM Plex Sans Thai',sans-serif;color:var(--faint)\">ค้นหารายชื่อ...<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:9px\">\n              <sc-for list=\"{{ caseList }}\" as=\"c\" hint-placeholder-count=\"6\">\n                <button onclick=\"{{ c.onClick }}\" style=\"display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:12px 13px;cursor:pointer;text-align:left;font-family:inherit\">\n                  <div style=\"position:relative;flex:none\">\n                    <span style=\"width:42px;height:42px;border-radius:13px;background:{{ c.avBg }};color:#fff;display:flex;align-items:center;justify-content:center;font:600 16px/1 'IBM Plex Sans Thai',sans-serif\">{{ c.initial }}<\u002Fspan>\n                    <span style=\"position:absolute;-top:4px;top:-5px;right:-5px;font:700 9px/1 'IBM Plex Sans',sans-serif;color:#fff;background:{{ c.prioColor }};border:2px solid var(--surface);border-radius:7px;padding:2px 4px\">P{{ c.prio }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"flex:1;min-width:0\">\n                    <div style=\"font:600 15px/1.2 'IBM Plex Sans Thai',sans-serif;color:var(--text)\">{{ c.name }}<\u002Fdiv>\n                    <div style=\"font:400 11px/1.3 'IBM Plex Sans Thai',sans-serif;color:{{ c.prioColor }};margin-top:2px\">{{ c.prioLabel }}<\u002Fdiv>\n                    <div style=\"font:400 11px/1.3 'IBM Plex Sans Thai',sans-serif;color:var(--sub);margin-top:2px\">{{ c.meta }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--faint)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ CASE DETAIL ============ -->\n        <sc-if value=\"{{ isCaseDetail }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:2px 16px 0;animation:fadein .25s ease\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px 16px 18px;margin-bottom:14px\">\n              <span style=\"width:64px;height:64px;border-radius:20px;background:{{ caseInfo.avBg }};color:#fff;display:flex;align-items:center;justify-content:center;font:600 26px/1 'IBM Plex Sans Thai',sans-serif;margin-bottom:11px\">{{ caseInfo.initial }}<\u002Fspan>\n              <div style=\"font:700 20px/1.2 'IBM Plex Sans Thai',sans-serif;color:var(--text)\">{{ caseInfo.name }}<\u002Fdiv>\n              <span style=\"display:inline-flex;align-items:center;gap:6px;margin-top:8px;font:600 11.5px/1 'IBM Plex Sans Thai',sans-serif;color:#fff;background:{{ caseInfo.prioColor }};border-radius:999px;padding:6px 12px\">Priority {{ caseInfo.prio }} · {{ caseInfo.prioLabel }}<\u002Fspan>\n              <button onclick=\"{{ onNewAppt }}\" style=\"margin-top:16px;width:100%;padding:13px 0;border-radius:14px;border:none;background:var(--brand);color:var(--brandc);font:600 14px/1 'IBM Plex Sans Thai',sans-serif;cursor:pointer\">+ นัดใหม่<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"font:600 12px/1 'IBM Plex Sans Thai',sans-serif;color:var(--sub);margin:4px 2px 10px\">ประวัติการนัด<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:9px\">\n              <sc-for list=\"{{ caseHistory }}\" as=\"h\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:12px 14px\">\n                  <div>\n                    <div style=\"font:600 13.5px/1.2 'IBM Plex Sans Thai',sans-serif;color:var(--text)\">{{ h.title }}<\u002Fdiv>\n                    <div style=\"font:400 11px/1.3 'IBM Plex Sans Thai',sans-serif;color:var(--sub);margin-top:2px\">{{ h.date }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <span style=\"font:600 10.5px/1 'IBM Plex Sans Thai',sans-serif;color:{{ h.tagCol }};background:var(--surface2);border-radius:7px;padding:5px 9px\">{{ h.tag }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ MORE HUB = " viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\"><path d=\"M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n                    <span style=\"font:600 15px/1 'IBM Plex Sans',sans-serif;color:var(--text)\">{{ timeCtl.start }}<\u002Fspan>\n                    <button onclick=\"{{ timeCtl.startUp }}\" style=\"width:30px;height:30px;flex:none;border-radius:9px;border:none;background:var(--surface2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n                  <\u002Fdiv>\n                  <span style=\"color:var(--faint);font-size:15px\">–<\u002Fspan>\n                  <div style=\"flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:8px;display:flex;align-items:center;justify-content:space-between;gap:4px\">\n                    <button onclick=\"{{ timeCtl.endDown }}\" style=\"width:30px;height:30px;flex:none;border-radius:9px;border:none;background:var(--surface2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\"><path d=\"M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n                    <span style=\"font:600 15px/1 'IBM Plex Sans',sans-serif;color:var(--text)\">{{ timeCtl.end }}<\u002Fspan>\n                    <button onclick=\"{{ timeCtl.endUp }}\" style=\"width:30px;height:30px;flex:none;border-radius:9px;border:none;background:var(--surface2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2 \">\n                    <button style=\"flex:1;text-align:center;padding:11px 0;border-radius:11px;border:none;cursor:pointer;font:600 12.5px/1 'IBM Plex Sans Thai',sans-serif;{{ d.style }}\">{{ d.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:flex-start;gap:9px;background:{{ scanBg }};border-radius:13px;padding:12px 14px\">\n                <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--appt)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:1px\"><path d=\"M12 2v4M12 18v4M2 12h4M18 12h4\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"4\"><\u002Fcircle><\u002Fsvg>\n                <span style=\"font:400 11.5px/1.45 'IBM Plex Sans Thai',sans-serif;color:var(--sub)\">ไม่ต้องล็อกเวลา — ระบบจะ<b style=\"color:var(--text)\">เสนอช่วงเวลาว่าง<\u002Fb>ให้อัตโนมัติจากตารางวันนี้<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <div style=\"display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px\">\n              <div>\n                <div style=\"font:500 14px/1 'IBM Plex Sans Thai',sans-serif;color:var(--text)\">แจ้งเตือน<\u002Fdiv>\n                <div style=\"font:400 11px/1 'IBM Plex Sans Thai',sans-serif;color:var(--sub);margin-top:3px\">{{ notifyLead }}<\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"width:44px;height:26px;border-radius:13px;background:var(--brand);position:relative;flex:none\"><span style=\"position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:#fff\"><\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n            <button onclick=\"{{ onSaveForm }}\" style=\"width:100%;padding:15px 0;border-radius:15px;border:none;background:var(--brand);color:var(--brandc);font:600 15px/1 'IBM Plex Sans Thai',sans-serif;cursor:pointer;margin-bottom:6px\">บันทึกกิจกรรม<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ RESCHEDULE STEP 1 ============ -->\n        <sc-if value=\"{{ isResched1 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:2px 16px 0;animation:fadein .25s ease\">\n            <div style=\"position:relative;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:15px 15px 15px 17px;margin-bottom:20px;overflow:hidden\">\n              <span style=\"position:absolute;left:0;top:0;bottom:0;width:4px;background:{{ rsCard.color }}\"><\u002Fspan>\n              <div style=\"font:400 11px/1 'IBM Plex Sans Thai',sans-serif;color:var(--sub)\">นัดเดิม<\u002Fdiv>\n              <div style=\"font:700 17px/1.2 'IBM Plex Sans Thai',sans-serif;color:var(--text);margin-top:5px\">{{ rsCard.title }}<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:10px;margin-top:8px\">\n                <span style=\"font:500 13px/1 'IBM Plex Sans Thai',sans-serif;color:var(--text)\">{{ rsCard.day }} · {{ rsCard.time }}<\u002Fspan>\n                <span style=\"display:flex;align-items:center;gap:5px;font:500 12px/1 'IBM Plex Sans Thai',sans-serif;color:var(--sub)\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ rsCard.prioColor }}\"><\u002Fspan>{{ rsCard.attendee }} · P{{ rsCard.prio }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font:600 13px/1 'IBM Plex Sans Thai',sans-serif;color:var(--text);margin:0 2px 9px\">เหตุผล (ไม่บังคับ)<\u002Fdiv>\n            <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px;font:400 13.5px/1 'IBM Plex Sans Thai',sans-serif;color:var(--faint);margin-bottom:20px\">เช่น ติดประชุมด่วน...<\u002Fdiv>\n            <div style=\"font:600 13px/1 'IBM Plex Sans Thai',sans-serif;color:var(--text);margin:0 2px 10px\">ค :var(--text)\">7 ช่วงเวลาว่าง<\u002Fb> ที่ยาวพอสำหรับนัด 1 ชม.<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:9px\">\n              <sc-for list=\"{{ rsSlots }}\" as=\"sl\" hint-placeholder-count=\"5\">\n                <button onclick=\"{{ sl.onPick }}\" style=\"position:relative;display:block;width:100%;text-align:left;background:var(--surface);border:1.5px solid {{ sl.cardBd }};border-radius:15px;padding:13px 14px;cursor:pointer;font-family:inherit;overflow:hidden\">\n                  <sc-if value=\"{{ sl.rec }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"position:absolute;top:0;right:0;background:var(--appt);color:#fff;font:600 9.5px/1 'IBM Plex Sans Thai',sans-serif;padding:5px 10px;border-radius:0 13px 0 11px\">✦ แนะนำ<\u002Fspan>\n                  <\u002Fsc-if>\n                  <div style=\"display:flex;align-items:center;gap:11px\">\n                    <div style=\"width:44px;flex:none;text-align:center;background:{{ sl.dayBg }};border-radius:11px;padding:7px 0\">\n                      <div style=\"font:600 9px/1 'IBM Plex Sans Thai',sans-serif;color:{{ sl.dayCol }}\">{{ sl.dowShort }}<\u002Fdiv>\n                      <div style=\"font:700 15px/1 'IBM Plex Sans',sans-serif;color:{{ sl.dateCol }};margin-top:2px\">{{ sl.dateNum }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"flex:1\">\n                      <div style=\"font:600 15px/1.2 'IBM Plex Sans',sans-serif;color:var(--text)\">{{ sl.time }}<\u002Fdiv>\n                      <div style=\"font:400 11.5px/1.35 'IBM Plex Sans Thai',sans-serif;color:{{ sl.noteCol }};margin-top:3px\">{{ sl.noteText }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--faint)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n                  <\u002Fdiv>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <button style=\"width:100%;margin-top:12px;padding:13px 0;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--sub);font:600 13.5px/1 'IBM Plex Sans Thai',sans-serif;cursor:pointer\">ดูช่วงเวลาเพิ่มเติม<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n\n      <!-- BOTTOM TAB BAR -->\n      <sc-if value=\"{{ showTabs }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"position:absolute;left:0;right:0;bottom:0;height:84px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding:11px 8px 0;z-index:30;box-shadow:0 -4px 20px rgba(0,0,0,.05)\">\n          <button onclick=\"{{ tab.today.onClick }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:{{ tab.today.color }};font-family:inherit\">\n            <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 10.5L12 3l9 7.5\"><\u002Fpath><path d=\"M5 9.5V20h14V9.5\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font:500 10px/1 'IBM Plex Sans Thai',sans-serif\">วันนี้<\u002Fspan>\n          <\u002Fbutton>\n          <button onclick=\"{{ tab.cal.onClick }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:{{ tab.cal.color }};font-family:inherit\">\n            <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4.5\" width=\"18\" height=\"16.5\" rx=\"3\"><\u002Frect><path d=\"M3 9h18M8 2.5v4M16 2.5v4\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font:500 10px/1 'IBM Plex Sans Thai',sans-serif\">ปฏิทิน<\u002Fspan>\n          <\u002Fbutton>\n          <div style=\"flex:1;display:flex;justify-content:center\">\n            <button onclick=\"{{ openAdd }}\" style=\"width:54px;height:54px;margin-top:-16px;border-radius:19px;border:none;background:var(--brand);color:var(--brandc);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 20px -4px var(--brand)\">\n              <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n          <\u002Fdiv>\n          <button onclick=\"{{ tab.cases.onClick }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:{{ tab.cases.color }};font-family:inherit\">\n            <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"9\" cy=\"8\" r=\"3.2\"><\u002Fcircle><path d=\"M3.5 20c0-3.3 2.5-5.5 5.5-5.5s5.5 2.2 5.5 5.5\"><\u002Fpath><path d=\"M16 5.2a3.2 3.2 0 010 5.9M18 14.8c2 .7 3.5 2.6 3.5 5\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font:500 10px/1 'IBM Plex Sans Thai',sans-serif\">เคส<\u002Fspan>\n          <\u002Fbutton>\n          <button onclick=\"{{ tab.more.onClick }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:{{ tab.more.color }};font-family:inherit\">\n            <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 7h16M4 12h16M4 17h10\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font:500 10px/1 'IBM Plex Sans Thai',sans-serif\">เพิ่มเติม<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- home indicator -->\n      <div style=\"position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:130px;height:5px;border-radius:3px;background:var(--text);opacity:.28;z-index:45;pointer-events:none\"><\u002Fdiv>\n\n      <!-- BOTTOM SHEET -->\n      <sc-if value=\"{{ sheetOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div onclick=\"{{ closeSheet }}\" style=\"position:absolute;inset:0;background:rgba(8,9,14,.42);z-index:50;animation:fadein .2s ease\"><\u002Fdiv>\n        <div style=\"position:absolute;left:0;right:0;bottom:0;z-index:51;background:var(--surface);border-radius:26px 26px 0 0;padding:10px 20px 30px;animation:sheetup .28s cubic-bezier(.2,.8,.2,1);box-shadow:0 -10px 40px rgba(0,0,0,.25)\">\n          <div style=\"width:38px;height:5px;border-radius:3px;background:var(--border);margin:0 auto 16px\"><\u002Fdiv>\n          <div style=\"display:flex;align-items:flex-start;gap:11px;margin-bottom:14px\">\n            <span style=\"width:12px;height:12px;border-radius:4px;background:{{ sheet.color }};margin-top:6px;flex:none\"><\u002Fspan>\n            <div style=\"flex:1\">\n              <div style=\"font:700 19px/1.2 'IBM Plex Sans Thai',sans-serif;color:var(--text)\">{{ sheet.title }}<\u002Fdiv>\n              <div style=\"font:400 13px/1.3 'IBM Plex Sans Thai',sans-serif;color:var(--sub);margin-top:3px\">{{ sheet.timeRange }} · {{ sheet.catName }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ sheet.isAppt }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:var(--surface2);border-radius:14px;padding:12px 14px;margin-bottom:12px\">\n              <div style=\"font:500 11px/1 'IBM Plex Sans Thai',sans-serif;color:var(--sub);margin-bottom:9px\">ผู้เข้าร่วมนัด<\u002Fdiv>\n              <div style=\"display:flex;flex-wrap:wrap;gap:7px\">\n                <sc-for list=\"{{ sheet.attendees }}\" as=\"p\" hint-placeholder-count=\"1\">\n                  <span style=\"display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:5px 11px 5px 7px;font:500 12.5px/1 'IBM Plex Sans Thai',sans-serif;color:var(--text)\">\n                    <span style=\"width:20px;height:20px;border-radius:50%;background:{{ p.avBg }};color:#fff;display:flex;align-items:center;justify-content:center;font:600 10px/1 'IBM Plex Sans Thai',sans-serif\">{{ p.initial }}<\u002Fspan>\n                    {{ p.name }}\n                    <span style=\"font:600 9px/1 'IBM Plex Sans',sans-serif;color:#fff;background:{{ p.prioColor }};border-radius:5px;padding:2px 5px\">P{{ p.prio }}<\u002Fspan>\n                  <\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border-radius:14px;padding:12px 14px;margin-bottom:16px\">\n            <div style=\"display:flex;align-items:center;gap:9px\">\n              <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--sub)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9\"><\u002Fpath><path d=\"M13.7 21a2 2 0 01-3.4 0\"><\u002Fpath><\u002Fsvg>\n              <span style=\"font:500 13px/1 'IBM Plex Sans Thai',sans-serif;color:var(--text)\">แจ้งเตือน {{ sheet.notifyText }}<\u002Fspan>\n            <\u002Fdiv>\n            <span style=\"font:400 12px/1 'IBM Plex Sans Thai',sans-serif;color:var(--sub)\">{{ sheet.repeatText }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:9px\">\n            <button onclick=\"{{ closeSheet }}\" style=\"flex:1;padding:13px 0;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--text);font:600 14px/1 'IBM Plex Sans Thai',sans-serif;cursor:pointer\">แก้ไข<\u002Fbutton>\n            <sc-if value=\"{{ sheet.isAppt }}\" hint-placeholder-val=\"{{ false }}\">\n              <button onclick=\"{{ sheet.onReschedule }}\" style=\"flex:2;display:flex;align-items:center;justify-content:center;gap:7px;padding:13px 0;border-radius:14px;border:none;background:var(--appt);color:#fff;font:600 14px/1 'IBM Plex Sans Thai',sans-serif;cursor:pointer;box-shadow:0 6px 16px -4px var(--appt)\">\n                <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 12a9 9 0 11-3-6.7L21 7\"><\u002Fpath><path d=\"M21 3v4h-4\"><\u002Fpath><\u002Fsvg>\n                เลื่อนนัด\n              <\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <button onclick=\"{{ closeSheet }}\" style=\"width:100%;margin-top:9px;padding:12px 0;border-radius:14px;border:none;background:none;color:#EF4444;font:600 13.5px/1 'IBM Plex Sans Thai',sans-serif;cursor:pointer\">ลบกิจกรรม<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- TOAST -->\n      <sc-if value=\"{{ toastOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;left:16px;right:16px;bottom:100px;z-index:60;background:#14161C;color:#fff;border-radius:14px;padding:13px 16px;display:flex;align-items:center;gap:10px;animation:fadein .25s ease;box-shadow:0 12px 30px rgba(0,0,0,.35)\">\n          <span style=\"width:22px;height:22px;flex:none;border-radius:50%;background:#16A34A;display:flex;align-items:center;justify-content:center\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <span style=\"font:500 13px/1.35 'IBM Plex Sans Thai',sans-serif\">{{ toastText }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"font:400 11.5px/1.4 'IBM Plex Sans Thai',sans-serif;color:#6c7180;text-align:center;max-width:392px\">แตะ “เลื่อนนัด” ที่การ์ด <span style=\"color:#F97316;font-weight:600\">เคส BM พี่คิง<\u002Fspan> เพื่อดูฟีเจอร์แนะนำเวลาว่างอัตโนมัติ · กดปุ่มสลับมุมมองสว่าง/มืดด้านบนเพื่อเทียบธีม<\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:432,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = {\n    theme: 'light', screen: 'today', prev: 'today',\n    sheetId: null, doneOv: {}, reschedById: {},\n    rsId: null, rsRange: 'week', toast: null,\n    calMode: 'week', weekMode: '1', caseId: null, moreScreen: null, formType: 'routine', calFilter: 'all',\n    startMin: 360, endMin: 390, repeatSet: [0,1,2,3,4], editField: null,\n  };\n\n  CATS = {\n    routine:['กิจวัตร','#64748B'], work:['งาน','#2563EB'], appointment:['นัดหมาย','#F97316'],\n    health:['สุขภาพ','#16A34A'], online:['งานออนไลน์','#7C3AED'], learning:['พัฒนาตัวเอง','#CA8A04'], community:['กิจกรรมกลุ่ม','#DB2777'],\n  };\n  PRIO = ['#DC2626','#EA580C','#CA8A04','#2563EB','#0891B2','#64748B'];\n  CONTACTS = {\n    king:{name:'พี่คิง', prio:1, initial:'ค'}, ket:{name:'เกต', prio:2, initial:'ก'},\n    tai:{name:'สาวต่าย', prio:3, initial:'ต'}, ae:{name:'คุณเอ', prio:2, initial:'อ'},\n    min:{name:'น้องมิ้น', prio:4, initial:'ม'}, bee:{name:'คุณบี', prio:5, initial:'บ'},\n  };\n  RAW = [\n    {id:'a1',s:'06:00',e:'06:30',t:'WAKE UP + แต่งตัว',c:'routine',ty:'routine',done:1},\n    {id:'a2',s:'06:30',e:'07:00',t:'eat BF / Shake Bodykey',c:'routine',ty:'routine',done:1},\n    {id:'a3',s:'07:00',e:'08:30',t:'อ่านหนังสือ',c:'learning',ty:'flexible',done:1},\n    {id:'a4',s:'09:00',e:'12:00',t:'work',c:'work',ty:'work',done:1},\n    {id:'a5',s:'12:00',e:'13:00',t:'พักเที่ยง / กินข้าว',c:'routine',ty:'routine',done:1},\n    {id:'a6',s:'13:00',e:'18:00',t:'work',c:'work',ty:'work',now:1},\n    {id:'a7',s:'18:00',e:'19:00',t:'Aerobic dance / weight',c:'health',ty:'routine'},\n    {id:'a8',s:'19:00',e:'20:00',t:'ตอบแชท MLAB',c:'online',ty:'flexible'},\n    {id:'a9',s:'20:00',e:'21:00',t:'เคส BM พี่คิง',c:'appointment',ty:'appointment',att:['king']},\n    {id:'a10',s:'21:00',e:'21:30',t:'อาบน้ำ-บำรุงผิว',c:'routine',ty:'routine'},\n    {id:'a11',s:'21:30',e:'22:30',t:'Book club online',c:'community',ty:'appointment',att:['tai','min','ket']},\n    {id:'a12',s:'01:00',e:'01:30',t:'go to bed',c:'routine',ty:'routine'},\n  ];\n  SLOTS = [\n    {id:'s1',day:'ศ. 18 เม.ย.',dow:'ศุกร์',time:'20:00 – 21:00',rec:1,note:'เวลาเดียวกับนัดเดิม — พี่คิงสะดวกช่วงนี้อยู่แล้ว'},\n    {id:'s2',day:'ส. 19 เม.ย.',dow:'เสาร์',time:'13:00 – 14:00',note:''},\n    {id:'s3',day:'ส. 19 เม.ย.',dow:'เสาร์',time:'16:00 – 17:00',note:''},\n    {id:'s4',day:'อา. 20 เม.ย.',dow:'อาทิตย์',time:'10:00 – 11:00',note:''},\n    {id:'s5',day:'อา. 20 เม.ย.',dow:'อาทิตย์',time:'15:00 – 16:00',note:''},\n    {id:'s6',day:'จ. 21 เม.ย.',dow:'จันทร์',time:'20:00 – 21:00',note:''},\n    {id:'s7',day:'พฤ. 17 เม.ย.',dow:'วันนี้',time:'22:30 – 23:30',warn:'ทับงานยืดหยุ่น: Book club'},\n  ];\n\n  isDark(){ return this.state.theme === 'dark'; }\n  palette(){\n    return this.isDark()\n      ? {bg:'#0E1014',surface:'#191C23',surface2:'#12141A',text:'#F2F4F8',sub:'#9AA1AD',faint:'#666C78',border:'#262A33',brand:'#7B7FF6',brandc:'#0E1014'}\n      : {bg:'#EEF0F4',surface:'#FFFFFF',surface2:'#F5F6F9',text:'#14161C',sub:'#6B7280',faint:'#A6ABB5',border:'#E6E8EC',brand:'#4F46E5',brandc:'#FFFFFF'};\n  }\n  soft(hex){ const c=hex.replace('#',''); const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16); return `rgba(${r},${g},${b},${this.isDark()?0.2:0.11})`; }\n\n  go(screen){ this.setState({prev:this.state.screen, screen, sheetId:null, moreScreen:null}); }\n  goBack(){ const map={reschedule2:'reschedule1', reschedule1:'today', stats:'more', settings:'more', categories:'more', caseDetail:'cases'}; this.setState({screen: map[this.state.screen] || this.state.prev || 'today', sheetId:null}); }\n  toggleTheme(){ this.setState({theme:this.isDark()?'light':'dark'}); }\n  showToast(txt){ this.setState({toast:txt}); clearTimeout(this._t); this._t=setTimeout(()=>this.setState({toast:null}),2600); }\n\n  acts(){\n    return this.RAW.map(a=>{ const d = (this.state.doneOv[a.id]!==undefined)?this.state.doneOv[a.id]:!!a.done; return {...a, doneNow:d}; });\n  }\n\n  renderVals(){\n    const t = this.palette(); const s = this.state;\n    const screen = s.screen;\n    const acts = this.acts();\n    const doneCount = acts.filter(a=>a.doneNow).length;\n    const total = acts.length;\n    const prog = Math.round((doneCount/total)*100);\n    const dash = `${prog/100*119.4} 119.4`;\n\n    const catOf = c => this.CATS[c] || ['อื่นๆ','#64748B'];\n    const contactSummary = ids => (ids||[]).map(i=>this.CONTACTS[i].name).join(', ');\n    const groupPrio = ids => Math.min(...(ids||[]).map(i=>this.CONTACTS[i].prio));\n\n    const todayActs = acts.map(a=>{\n      const [cn,col] = catOf(a.c);\n      const isAppt = a.ty==='appointment';\n      const resch = s.reschedById[a.id];\n      return {\n        id:a.id, start:a.s, end:a.e, title:a.t, color:col, catName:cn, softBg:this.soft(col),\n        isNow: !!a.now && !resch, op: a.doneNow?0.55:1, strike: a.doneNow?'line-through':'none',\n        showCheck: a.ty!=='appointment',\n        checkBorder: a.doneNow? '#16A34A':'var(--faint)', checkBg: a.doneNow?'#16A34A':'transparent', checkTick: a.doneNow?'#fff':'transparent',\n        isAppt, attendeeText: isAppt? ((a.att&&a.att.length>1)? `${this.CONTACTS[a.att[0]].name} +${a.att.length-1}` : contactSummary(a.att)) : '',\n        prioColor: isAppt? this.PRIO[groupPrio(a.att)-1] : '#000',\n        rescheduled: !!resch, reschedTo: resch||'',\n        onClick: ()=>this.setState({sheetId:a.id}),\n        onCheck: (ev)=>{ ev.stopPropagation(); this.setState(st=>({doneOv:{...st.doneOv,[a.id]:!acts.find(x=>x.id===a.id).doneNow}})); },\n      };\n    });\n\n    // day strip\n    const dows=['จ','อ','พ','พฤ','ศ','ส','อา']; const nums=[14,15,16,17,18,19,20];\n    const dayStrip = dows.map((d,i)=>{ const active=i===3; return {\n      dow:d, num:nums[i], onClick:()=>{},\n      bg: active?'var(--brand)':'var(--surface)', border: active?'var(--brand)':'var(--border)',\n      subCol: active?'rgba(255,255,255,.8)':'var(--sub)', numCol: active?'var(--brandc)':'var(--text)',\n      dot: active? 'rgba(255,255,255,.9)' : (i<3?'#16A34A':'var(--faint)'),\n    };});\n\n    // sheet\n    const sa = s.sheetId? acts.find(a=>a.id===s.sheetId):null;\n    let sheet={};\n    if(sa){ const [cn,col]=catOf(sa.c); const isAppt=sa.ty==='appointment';\n      sheet={ title:sa.t, color:col, catName:cn, timeRange:`${sa.s} – ${sa.e}`, isAppt,\n        notifyText: sa.ty==='appointment'? 'ก่อน 30 นาที':'ก่อน 15 นาที',\n        repeatText: sa.ty==='routine'?'ทุกวัน': sa.ty==='work'?'จ.–ศ.':'ครั้งเดียว',\n        attendees:(sa.att||[]).map(i=>{const c=this.CONTACTS[i];return{name:c.name,initial:c.initial,prio:c.prio,prioColor:this.PRIO[c.prio-1],avBg:col};}),\n        onReschedule:()=>this.setState({rsId:sa.id, sheetId:null, prev:'today', screen:'reschedule1'}),\n      };\n    }\n\n    // reschedule\n    const ra = s.rsId? this.RAW.find(a=>a.id===s.rsId):null;\n    const rsSlots = this.SLOTS.map(sl=>{ const num=(sl.day.match(/\\d+/)||['?'])[0]; return {\n      rec:!!sl.rec, time:sl.time, dowShort:sl.dow.slice(0,3), dateNum:num,\n      cardBd: sl.rec?'#F97316':'var(--border)',\n      dayBg: sl.rec?this.soft('#F97316'):'var(--surface2)', dayCol: sl.rec?'#F97316':'var(--sub)', dateCol: sl.rec?'#F97316':'var(--text)',\n      noteText: sl.warn? sl.warn : (sl.note||sl.day), noteCol: sl.warn?'#EA580C':'var(--sub)',\n      onPick:()=>{\n        this.setState(st=>({reschedById:{...st.reschedById,[st.rsId]:`${sl.day.replace(/ เม\\.ย\\./,'')} ${sl.time.split(' ')[0]}`}, screen:'today', rsId:null}));\n        this.showToast(`เลื่อนนัด “${ra?ra.t:''}” ไป ${sl.day} ${sl.time} แล้ว · ตั้งแจ้งเตือนใหม่อัตโนมัติ`);\n      }};\n    });\n\n    // ---- Calendar: time-of-day filter ----\n    const hourOf=t=>parseInt((t||'0').split(':')[0],10);\n    const RANGES={all:()=>true, morning:h=>h>=6&&h<12, afternoon:h=>h>=12&&h<17, evening:h=>h>=17&&h<21, night:h=>(h>=21||h<3)};\n    const inR = RANGES[s.calFilter] || RANGES.all;\n    const filterDefs=[['all','ทั้งวัน'],['morning','เช้า'],['afternoon','บ่าย'],['evening','เย็น'],['night','ค่ำ']];\n    const filterSub={all:'ทุกช่วงเวลา',morning:'06:00–12:00',afternoon:'12:00–17:00',evening:'17:00–21:00',night:'21:00–02:00'}[s.calFilter];\n    const calFilters=filterDefs.map(f=>{ const on=f[0]===s.calFilter; return {label:f[1],\n      bg:on?'var(--brand)':'var(--surface2)', col:on?'var(--brandc)':'var(--sub)',\n      onClick:()=>this.setState({calFilter:f[0]})};});\n\n    // ---- Calendar: week (1 week) ----\n    const wkDows=['จ','อ','พ','พฤ','ศ','ส','อา']; const wkNums=[14,15,16,17,18,19,20];\n    const wkEvents=[\n      [['work','work','09:00'],['Aerobic','health','18:00'],['Book club','community','21:30']],\n      [['work','work','09:00'],['QC Center','online','19:00']],\n      [['work','work','09:00'],['center bkk','appointment','14:00'],['อ่าน','learning','07:00']],\n      [['work','work','09:00'],['เคส พี่คิง','appointment','20:00'],['MLAB','online','19:00']],\n      [['work','work','09:00'],['fitness','health','18:00']],\n      [['Survey มศว.','appointment','10:00'],['community','community','15:00']],\n      [['อ่านหนังสือ','learning','09:00'],['go to bed','routine','01:00']],\n    ];\n    const weekCols=wkDows.map((d,i)=>{ const evs=wkEvents[i].filter(e=>inR(hourOf(e[2]))).map(e=>({title:e[0],time:e[2],color:catOf(e[1])[1],bg:this.soft(catOf(e[1])[1])})); return {dow:d,num:wkNums[i],\n      headBg:i===3?'var(--brand)':'var(--surface2)', headCol:i===3?'var(--brandc)':'var(--text)',\n      events:evs, empty:
